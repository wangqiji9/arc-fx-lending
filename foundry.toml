[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]
optimizer = true
optimizer_runs = 200
solc_version = "0.8.24"

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 256
depth = 128
call_override = false
fail_on_revert = false

[rpc_endpoints]
arc_testnet = "https://rpc.testnet.arc.network"

[etherscan]
arc_testnet = { key = "placeholder", url = "https://testnet.arcscan.app" }
